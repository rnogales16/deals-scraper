cross_store:
  enabled: true

telegram:
  bot_token: ${TELEGRAM_BOT_TOKEN}
  chat_id: "201330690"
  max_offers_per_cycle: 10

market_price:
  enabled: true
  max_idealo_per_cycle: 80
  cache_ttl_days: 7
  cross_store_fuzzy_threshold: 80

filters:
  min_discount: 50
  price_min: 0.01
  price_max: 5000.0
  keywords: []
  categories: []
  real_discount_min: 50
  min_observations: 2
  exclude_keywords:
    # Cosméticos / cuidado personal
    - "polvos"
    - "maquillaje"
    - "cosmetic"
    - "crema"
    - "sérum"
    - "perfume"
    - "colonia"
    - "desodorante"
    - "champú"
    - "gel de baño"
    - "pasta de dientes"
    - "cepillo dental"
    # Ropa / calzado
    - "zapatos"
    - "zapatillas"
    - "botas"
    - "calcetines"
    - "camiseta"
    - "pantalón"
    - "chaqueta"
    - "vestido"
    # Hogar / decoración sin valor tech
    - "vela"
    - "cojín"
    - "mantel"
    - "servilleta"
    - "toalla"
    - "sábana"
    - "cortina"
    - "alfombra"
    # Alimentación
    - "chocolate"
    - "galletas"
    - "café cápsulas"
    # Accesorios de bajo valor
    - "correa de repuesto"
    - "funda de silicona"
    - "protector de pantalla"
    - "cristal templado"
    - "pegatina"
    - "sticker"
    - "skin"

# Modo velocidad: "fast" (1-2.5s/URL, paralelo) o "stealth" (8-24s/URL, secuencial)
speed:
  mode: fast
  max_concurrent_stores: 5
  max_concurrent_urls_per_store: 4
  price_error_threshold: 65   # % descuento para considerar error de precio (alto = más estricto)

anti_ban:
  delay_min: 0.5
  delay_max: 1.5
  max_requests_per_minute: 15
  proxy_url: null

# =======================================================================
# TIENDAS — Scrapers específicos (amazon, pccomponentes, mediamarkt)
#           + GenericStore para todas las demás
# =======================================================================

stores:

  # -------------------------------------------------------------------
  # AMAZON.ES — Scraper específico (JSON embebido en mountWidget)
  # -------------------------------------------------------------------
  - name: amazon
    enabled: true
    interval_minutes: 2
    client_type: browser
    scrape_urls:
      - "https://www.amazon.es/gp/goldbox"
      # Electrónica / Informática
      - "https://www.amazon.es/s?k=portatil&rh=p_n_deal_type%3AeFuture"
      - "https://www.amazon.es/s?k=tablet&rh=p_n_deal_type%3AeFuture"
      - "https://www.amazon.es/s?k=monitor&rh=p_n_deal_type%3AeFuture"
      - "https://www.amazon.es/s?k=tarjeta+grafica"
      - "https://www.amazon.es/s?k=ssd+nvme"
      - "https://www.amazon.es/s?k=televisor"
      # Smartphones
      - "https://www.amazon.es/s?k=iphone"
      - "https://www.amazon.es/s?k=samsung+galaxy"
      - "https://www.amazon.es/s?k=xiaomi+redmi"
      # Gaming
      - "https://www.amazon.es/s?k=playstation+5"
      - "https://www.amazon.es/s?k=nintendo+switch"
      # Wearables / Audio
      - "https://www.amazon.es/s?k=airpods"
      - "https://www.amazon.es/s?k=smartwatch"
      - "https://www.amazon.es/s?k=auriculares+bluetooth"
      # Electrodomésticos de alto valor
      - "https://www.amazon.es/s?k=robot+aspirador"
      - "https://www.amazon.es/s?k=cafetera+automatica"
      - "https://www.amazon.es/s?k=patinete+electrico"
      # Página 2 — más volumen en búsquedas productivas
      - "https://www.amazon.es/s?k=portatil&rh=p_n_deal_type%3AeFuture&page=2"
      - "https://www.amazon.es/s?k=tablet&rh=p_n_deal_type%3AeFuture&page=2"
      - "https://www.amazon.es/s?k=televisor&page=2"
      - "https://www.amazon.es/s?k=iphone&page=2"
      - "https://www.amazon.es/s?k=samsung+galaxy&page=2"
      - "https://www.amazon.es/s?k=auriculares+bluetooth&page=2"
      # Nuevas categorías
      - "https://www.amazon.es/s?k=router+wifi"
      - "https://www.amazon.es/s?k=disco+externo"
      - "https://www.amazon.es/s?k=camara+fotos"
      - "https://www.amazon.es/s?k=proyector"
      - "https://www.amazon.es/s?k=drone"
      - "https://www.amazon.es/s?k=ebook+kindle"
      - "https://www.amazon.es/s?k=domotica+hogar"
      - "https://www.amazon.es/s?k=nas+almacenamiento"
      - "https://www.amazon.es/s?k=webcam"
      - "https://www.amazon.es/s?k=ordenador+sobremesa"

  # -------------------------------------------------------------------
  # PCCOMPONENTES — Scraper específico (data-product-* attributes)
  # -------------------------------------------------------------------
  # PCComponentes: Cloudflare Turnstile bloquea headless — necesita proxy
  - name: pccomponentes
    enabled: false
    interval_minutes: 5
    client_type: browser
    scrape_urls:
      - "https://www.pccomponentes.com/portatiles"
      - "https://www.pccomponentes.com/smartphones"
      - "https://www.pccomponentes.com/tarjetas-graficas"
      - "https://www.pccomponentes.com/televisores"
      - "https://www.pccomponentes.com/monitores"
      - "https://www.pccomponentes.com/tablets"
      - "https://www.pccomponentes.com/discos-duros-ssd"
      - "https://www.pccomponentes.com/procesadores"
      - "https://www.pccomponentes.com/auriculares"
      - "https://www.pccomponentes.com/routers"

  # -------------------------------------------------------------------
  # MEDIAMARKT — Scraper específico (data-test attributes)
  # -------------------------------------------------------------------
  - name: mediamarkt
    enabled: true
    interval_minutes: 2
    client_type: browser
    scrape_urls:
      - "https://www.mediamarkt.es/es/search.html?query=smartphone"
      - "https://www.mediamarkt.es/es/search.html?query=portatil"
      - "https://www.mediamarkt.es/es/search.html?query=televisor"
      - "https://www.mediamarkt.es/es/search.html?query=tablet"
      - "https://www.mediamarkt.es/es/search.html?query=auriculares"
      - "https://www.mediamarkt.es/es/search.html?query=smartwatch"

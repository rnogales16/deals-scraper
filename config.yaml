# Deals Scraper — Configuración principal
# Scraping masivo de ofertas en tiendas online españolas

# =======================================================================
# WATCHLIST — Alertar cuando se vean productos a buen precio
# =======================================================================
watchlist:
  enabled: true
  products:
    - name: "iPhone 15"
      max_price: 600
      min_price: 200
      exclude_keywords: ["funda", "carcasa", "protector", "cristal", "cargador", "cable"]
    - name: "AirPods Pro"
      max_price: 180
      min_price: 50
      exclude_keywords: ["funda", "carcasa", "protector", "estuche"]
    - name: "PlayStation 5"
      max_price: 350
      min_price: 150
      exclude_keywords: ["juego", "game", "edición", "edition", "DLC", "suscripción", "subscription", "plus", "mando", "controller", "headset", "auricular", "soporte", "skin", "pegatina", "disco", "digital edition"]
    - name: "MacBook Air M2"
      max_price: 800
      min_price: 300
      exclude_keywords: ["funda", "carcasa", "protector", "cargador", "adaptador", "hub"]
    - name: "iPad Air"
      max_price: 300
      min_price: 100
      exclude_keywords: ["funda", "carcasa", "protector", "cristal", "teclado", "pencil", "cargador"]

telegram:
  bot_token: ${TELEGRAM_BOT_TOKEN}
  chat_id: "201330690"
  max_offers_per_cycle: 20

market_price:
  enabled: true
  max_idealo_per_cycle: 40
  cache_ttl_days: 7
  cross_store_fuzzy_threshold: 80

filters:
  min_discount: 60
  price_min: 0.01
  price_max: 20000000.0
  keywords: []
  categories: []
  real_discount_min: 40
  min_observations: 2

# Modo velocidad: "fast" (1-2.5s/URL, paralelo) o "stealth" (8-24s/URL, secuencial)
speed:
  mode: fast
  max_concurrent_stores: 4
  max_concurrent_urls_per_store: 3
  price_error_threshold: 50   # % descuento para considerar error de precio

anti_ban:
  delay_min: 0.5
  delay_max: 1.5
  max_requests_per_minute: 15
  proxy_url: null

# =======================================================================
# TIENDAS — Scrapers específicos (amazon, pccomponentes, mediamarkt)
#           + GenericStore para todas las demás
# =======================================================================

stores:

  # -------------------------------------------------------------------
  # AMAZON.ES — Scraper específico (JSON embebido en mountWidget)
  # -------------------------------------------------------------------
  - name: amazon
    enabled: true
    interval_minutes: 3
    client_type: browser
    scrape_urls:
      - "https://www.amazon.es/gp/goldbox"
      # Electrónica / Informática
      - "https://www.amazon.es/s?k=portatil&rh=p_n_deal_type%3AeFuture"
      - "https://www.amazon.es/s?k=tablet&rh=p_n_deal_type%3AeFuture"
      - "https://www.amazon.es/s?k=monitor&rh=p_n_deal_type%3AeFuture"
      - "https://www.amazon.es/s?k=tarjeta+grafica"
      - "https://www.amazon.es/s?k=ssd+nvme"
      - "https://www.amazon.es/s?k=televisor"
      # Smartphones
      - "https://www.amazon.es/s?k=iphone"
      - "https://www.amazon.es/s?k=samsung+galaxy"
      - "https://www.amazon.es/s?k=xiaomi+redmi"
      # Gaming
      - "https://www.amazon.es/s?k=playstation+5"
      - "https://www.amazon.es/s?k=nintendo+switch"
      # Wearables / Audio
      - "https://www.amazon.es/s?k=airpods"
      - "https://www.amazon.es/s?k=smartwatch"
      - "https://www.amazon.es/s?k=auriculares+bluetooth"
      # Electrodomésticos de alto valor
      - "https://www.amazon.es/s?k=robot+aspirador"
      - "https://www.amazon.es/s?k=cafetera+automatica"
      - "https://www.amazon.es/s?k=patinete+electrico"

